<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avelle Records</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Allura&family=Quicksand:wght@300..700&display=swap');

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      background:#000;
      color:white;
      font-family:'Quicksand', sans-serif;
      overflow-x:hidden;
    }

    header{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      padding:24px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:1000;
      background:rgba(0,0,0,0.35);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .avelle{
      font-family:'Allura', cursive;
      font-size:3rem;
    }

    .records{
      font-weight:300;
      letter-spacing:3px;
      opacity:0.85;
    }

    nav{display:flex;gap:30px;}
    nav a{text-decoration:none;color:white;opacity:0.8;}
    nav a:hover{opacity:1;}

    .hero{
      position:relative;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
      padding:20px;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(-45deg,#000,#0f172a,#111827,#1e1b4b,#000);
      background-size:400% 400%;
      animation:gradientMove 15s ease infinite;
      z-index:-2;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:900px;
      height:900px;
      background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 70%);
      filter:blur(50px);
      animation:float 10s ease-in-out infinite;
      z-index:-1;
    }

    @keyframes gradientMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    @keyframes float{
      0%{transform:translateY(0);}
      50%{transform:translateY(-40px);}
      100%{transform:translateY(0);}
    }

    #title{font-size:clamp(3rem,10vw,7rem);margin-bottom:20px;}
    .hero-avelle{font-family:'Allura', cursive;font-size:1.2em;}
    .subtitle{opacity:0.8;max-width:700px;margin:auto;line-height:1.8;}

    .section{padding:120px 10%;}
    .section-title{font-size:2.5rem;margin-bottom:50px;}

    /* DEMO FORM */
    .demo-form-wrapper{
      max-width:700px;
      margin:auto;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:40px;
      backdrop-filter:blur(16px);
    }

    .demo-form{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .demo-form label{
      font-size:0.9rem;
      opacity:0.8;
    }

    .demo-form input,
    .demo-form textarea{
      padding:14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(0,0,0,0.4);
      color:white;
      outline:none;
    }

    .demo-form input:focus,
    .demo-form textarea:focus{
      border-color:rgba(255,255,255,0.3);
    }

    .demo-form button{
      margin-top:10px;
      padding:14px;
      border:none;
      border-radius:999px;
      background:white;
      color:black;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .demo-form button:hover{
      transform:scale(1.03);
      opacity:0.9;
    }

    footer{
      padding:50px 10%;
      border-top:1px solid rgba(255,255,255,0.08);
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      opacity:0.6;
    }

    @media(max-width:900px){
      nav{display:none;}
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <span class="avelle">Avelle</span>
    <span class="records">RECORDS</span>
  </div>
  <nav>
    <a href="#demos">Submit Demo</a>
    <a href="#">Releases</a>
    <a href="#">News</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1 id="title"><span class="hero-avelle">Avelle</span> Records</h1>
    <p class="subtitle">Building the next wave of electronic artists and cinematic sound.</p>
  </div>
</section>

<!-- DEMO SECTION -->
<section class="section" id="demos">
  <h2 class="section-title">Submit Your Demo</h2>

  <div class="demo-form-wrapper">
    <form action="https://formsubmit.co/YOUR_EMAIL_HERE" method="POST" class="demo-form">

      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://yourdomain.com/thanks.html">

      <label>Artist Name</label>
      <input type="text" name="artist_name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Track Name</label>
      <input type="text" name="track_name" required>

      <label>Genre</label>
      <input type="text" name="genre">

      <label>Demo Link</label>
      <input type="url" name="demo_link" required>

      <label>Message</label>
      <textarea name="message" rows="6" placeholder="Tell us about yourself..."></textarea>

      <button type="submit">Send Demo</button>
    </form>
  </div>
</section>

<footer>
  <p>© 2026 Avelle Records</p>
  <p>Designed for music.</p>
</footer>

</body>
</html>
