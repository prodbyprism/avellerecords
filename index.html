<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Avelle Records</title>

  <link rel="manifest" href="manifest.json">

  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="theme-color" content="#000000">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Quicksand:wght@300..700&family=Allura&display=swap" rel="stylesheet">

  <!-- Cookiebot -->
  <script id="Cookiebot" src="https://consent.cookiebot.com/uc.js" data-cbid="df68f618-ecdf-4685-90d1-ac276db796d4" data-blockingmode="auto" type="text/javascript"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      background:#000;
      color:white;
      font-family:'Quicksand', sans-serif;
      overflow-x:hidden;
    }

    body.menu-open{
      overflow:hidden;
    }

    header{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      padding:24px 30px;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:1000;
      background:transparent;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .avelle{
      font-family:'Allura', cursive;
      font-size:3rem;
    }

    .records{
      font-weight:300;
      letter-spacing:4px;
      opacity:0.85;
      font-size:1.1rem;
    }

    .hamburger{
      position:absolute;
      right:30px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:6px;
      cursor:pointer;
      z-index:1100;
    }

    .hamburger span{
      width:28px;
      height:2px;
      background:white;
      transition:0.3s ease;
      transform-origin:center;
    }

    .hamburger.active span:nth-child(1){
      transform:translateY(8px) rotate(45deg);
    }

    .hamburger.active span:nth-child(2){
      opacity:0;
    }

    .hamburger.active span:nth-child(3){
      transform:translateY(-8px) rotate(-45deg);
    }

    .menu{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100vh;
      background:black;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:30px;
      transform:translateY(-100%);
      transition:0.4s ease;
      z-index:999;
    }

    .menu.active{
      transform:translateY(0);
    }

    .menu a{
      color:white;
      text-decoration:none;
      font-size:2rem;
      font-family:'Anton', sans-serif;
      letter-spacing:2px;
      cursor:pointer;
    }

    .stripe{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:42px;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:999;
      transform:translateY(-100%);
      transition:0.35s ease;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .stripe.active{
      transform:translateY(0);
    }

    .stripe span{
      font-family:'Anton', sans-serif;
      letter-spacing:3px;
      color:white;
      font-size:0.9rem;
      font-weight:300;
    }

    /* HERO */
    .hero{
      position:relative;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
      padding:20px;
    }

    .hero-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
      filter:brightness(0.95) contrast(1.05) saturate(1.05);
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at center, rgba(0,0,0,0.12), rgba(0,0,0,0.30));
      z-index:-1;
    }

    #title{
      font-family:'Anton', sans-serif;
      font-size:clamp(2rem, 5vw, 3.5rem);
      margin-bottom:24px;
      font-weight:400;
      line-height:1.2;
    }

    /* SOCIAL BUTTONS */

    .social-buttons{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:22px;
      margin-top:10px;
    }

    .social-button{
      width:56px;
      height:56px;
      display:flex;
      justify-content:center;
      align-items:center;
      border:1px solid rgba(255,255,255,0.15);
      border-radius:50%;
      background:black;
      transition:0.3s ease;
      text-decoration:none;
    }

    .social-button img{
      width:24px;
      height:24px;
      object-fit:contain;
      filter:invert(1);
    }

    .social-button:hover{
      transform:translateY(-3px);
      border-color:white;
      background:rgba(255,255,255,0.05);
    }

    /* SECTIONS */

    .section{
      padding:120px 10%;
      border-top:1px solid rgba(255,255,255,0.06);
      border-bottom:1px solid rgba(255,255,255,0.06);
      position:relative;
    }

    .section::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:1px;
      background:linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
    }

    .section::after{
      content:"";
      position:absolute;
      bottom:0;
      left:0;
      width:100%;
      height:1px;
      background:linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
    }

    .section-title{
      font-family:'Anton', sans-serif;
      font-size:clamp(2rem, 5vw, 3.5rem);
      font-weight:400;
      text-align:center;
      margin-top:-50px;
      margin-bottom:50px;
      line-height:1.2;
    }

    .about-wrapper{
      max-width:800px;
      margin:auto;
      text-align:center;
      display:flex;
      flex-direction:column;
      gap:18px;
      opacity:0.9;
      font-size:1.1rem;
      line-height:1.7;
    }

    .about-wrapper p{
      color:rgba(255,255,255,0.85);
    }

    .demo-form-wrapper{
      max-width:700px;
      margin:auto;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:40px;
      backdrop-filter:blur(16px);
    }

    .demo-form{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .demo-form input,
    .demo-form textarea{
      padding:14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(20,20,20,0.95);
      color:white;
      outline:none;
    }

    .demo-form button{
      margin-top:35px;
      padding:14px 28px;
      background:transparent;
      color:white;
      font-weight:600;
      border:1px solid rgba(255,255,255,0.8);
      transition:0.3s ease;
      cursor:pointer;
    }

    .demo-form button:hover{
      background:white;
      color:black;
    }

    @media(max-width:768px){

      header{
        padding:20px;
      }

      .avelle{
        font-size:2.4rem;
      }

      .records{
        font-size:0.9rem;
        letter-spacing:3px;
      }

      .hamburger{
        right:20px;
      }

      .social-buttons{
        gap:18px;
      }

      .social-button{
        width:52px;
        height:52px;
      }

      .demo-form-wrapper{
        padding:28px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <span class="avelle">Avelle</span>
    <span class="records">RECORDS</span>
  </div>

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</header>

<div class="menu" id="menu">
  <a href="#hero">Home</a>
  <a href="#about">About</a>
  <a href="#demos">Demo</a>
</div>

<div class="stripe" id="stripe">
  <span>AVELLE RECORDS</span>
</div>

<main>

<section class="hero" id="hero">

<video 
  class="hero-video"
  autoplay 
  muted 
  loop 
  playsinline 
  webkit-playsinline
  preload="auto"
  data-cookieconsent="ignore"
>
  <source src="https://github.com/prodbyprism/avellerecords/raw/refs/heads/main/videos/hero.mp4" type="video/mp4">
</video>

  <div>
    <h1 id="title">Swedish electronic and pop record label.</h1>

    <div class="social-buttons">

      <a href="https://instagram.com/avellerecords" target="_blank" class="social-button">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram">
      </a>

      <a href="https://open.spotify.com" target="_blank" class="social-button">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg" alt="Spotify">
      </a>

      <a href="https://soundcloud.com" target="_blank" class="social-button">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/soundcloud.svg" alt="SoundCloud">
      </a>

    </div>
  </div>
</section>

<section class="section" id="about">
  <h2 class="section-title">About Us</h2>

  <div class="about-wrapper">
    <p>
      Avelle Records is a Swedish independent label focused on electronic and pop music.
      We work with new and established artists around the world.
    </p>
  </div>
</section>

<section class="section" id="demos">
  <h2 class="section-title">Submit Your Demo</h2>

  <div class="demo-form-wrapper">
    <form class="demo-form" action="https://formsubmit.co/avellerecords@gmail.com" method="POST">
      <input type="hidden" name="_captcha" value="false">

      <input type="text" name="artist_name" placeholder="Artist Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="track_name" placeholder="Track Name" required>
      <input type="url" name="demo_link" placeholder="Demo Link" required>

      <textarea name="message" rows="5" placeholder="Message"></textarea>

      <button type="submit">Send Demo</button>
    </form>
  </div>
</section>

</main>

<script>
const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");
const links = document.querySelectorAll(".menu a");

function closeMenu(){
  hamburger.classList.remove("active");
  menu.classList.remove("active");
  document.body.classList.remove("menu-open");
}

hamburger.addEventListener("click", () => {
  hamburger.classList.toggle("active");
  menu.classList.toggle("active");

  document.body.classList.toggle("menu-open", menu.classList.contains("active"));
});

links.forEach(link => link.addEventListener("click", closeMenu));

const header = document.querySelector("header");
const stripe = document.getElementById("stripe");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    stripe.classList.toggle("active", !entry.isIntersecting);
  });
});

observer.observe(header);
</script>

</body>
</html>
