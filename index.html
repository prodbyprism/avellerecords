<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Avelle Records | Swedish Electronic Record Label</title>

  <!-- SEO -->
  <meta name="description" content="Avelle Records is a Swedish independent electronic record label. Submit your demo and join emerging artists in electronic music.">

  <link rel="canonical" href="https://avellerecords.com/">

  <!-- Open Graph -->
  <meta property="og:title" content="Avelle Records">
  <meta property="og:description" content="Swedish independent electronic record label. Submit your demo.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://avellerecords.com/">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">

  <!-- GOOGLE FONTS (OPTIMIZED) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Allura&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      background:#000;
      color:white;
      font-family:'Quicksand', sans-serif;
      overflow-x:hidden;
      font-synthesis:none;
    }

    header{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      padding:24px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:1000;
      background:rgba(0,0,0,0.35);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .avelle{
      font-family:'Allura', cursive;
      font-size:3rem;
    }

    .records{
      font-weight:300;
      letter-spacing:3px;
      opacity:0.85;
    }

    nav a{
      text-decoration:none;
      color:white;
      opacity:0.8;
      transition:0.3s;
    }

    nav a:hover{
      opacity:1;
    }

    .hero{
      position:relative;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
      padding:20px;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(-45deg,#000,#0f172a,#111827,#1e1b4b,#000);
      background-size:400% 400%;
      animation:gradientMove 15s ease infinite;
      z-index:-2;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:900px;
      height:900px;
      background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 70%);
      filter:blur(50px);
      animation:float 10s ease-in-out infinite;
      z-index:-1;
    }

    @keyframes gradientMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    @keyframes float{
      0%{transform:translateY(0);}
      50%{transform:translateY(-40px);}
      100%{transform:translateY(0);}
    }

    #title{
      font-size:clamp(3rem,10vw,7rem);
      margin-bottom:20px;
    }

    .subtitle{
      opacity:0.8;
      max-width:700px;
      margin:auto;
      line-height:1.8;
    }

    .hero-button{
      display:inline-block;
      margin-top:35px;
      padding:14px 28px;
      border-radius:999px;
      background:white;
      color:black;
      text-decoration:none;
      font-weight:600;
      transition:0.3s;
    }

    .hero-button:hover{
      transform:scale(1.05);
      opacity:0.9;
    }

    .section{
      padding:120px 10%;
    }

    .section-title{
      font-size:2.5rem;
      margin-bottom:50px;
      text-align:center;
    }

    .demo-form-wrapper{
      max-width:700px;
      margin:auto;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:40px;
      backdrop-filter:blur(16px);
    }

    .demo-form{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .demo-form input,
    .demo-form textarea{
      padding:14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(20,20,20,0.95);
      color:white;
      outline:none;
      font-family:'Quicksand', sans-serif;
    }

    .demo-form button{
      padding:14px;
      border:none;
      border-radius:999px;
      background:white;
      color:black;
      font-weight:600;
      cursor:pointer;
    }

    footer{
      padding:50px 10%;
      border-top:1px solid rgba(255,255,255,0.08);
      display:flex;
      justify-content:space-between;
      opacity:0.6;
    }

    @media(max-width:900px){
      header{
        padding:20px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <span class="avelle">Avelle</span>
    <span class="records">RECORDS</span>
  </div>

  <nav>
    <a href="#demos">Submit Demo</a>
  </nav>
</header>

<main>

<section class="hero">
  <div>
    <h1 id="title">Avelle Records</h1>

    <p class="subtitle">
      Electronic record label based in Sweden.
    </p>

    <a href="#demos" class="hero-button">Send Us A Demo</a>
  </div>
</section>

<section class="section" id="demos">
  <h2 class="section-title">Submit Your Demo</h2>

  <div class="demo-form-wrapper">

    <form action="https://formsubmit.co/avellerecords@gmail.com" method="POST">

      <input type="hidden" name="_captcha" value="false">

      <input type="text" name="artist_name" placeholder="Artist Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="track_name" placeholder="Track Name" required>
      <input type="text" name="genre" placeholder="Genre">
      <input type="url" name="demo_link" placeholder="Demo Link" required>
      <textarea name="message" rows="6" placeholder="Message"></textarea>

      <button type="submit">Send Demo</button>

    </form>

  </div>
</section>

</main>

<footer>
  <p>© 2026 Avelle Records</p>
  <p>Designed for music.</p>
</footer>

</body>
</html>
