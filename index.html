<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Avelle Records</title>

  <meta name="description" content="Avelle Records is a Swedish independent electronic & pop record label. Submit your demo and join emerging artists.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      background:#000;
      color:white;
      font-family:'Quicksand', sans-serif;
      overflow-x:hidden;
    }

    /* HEADER */

    header{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      padding:24px 0;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:1000;
      background:transparent;
      transition:transform 0.4s ease;
    }

    header.hide{
      transform:translateY(-100%);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .avelle{
      font-family:'Allura', cursive;
      font-size:3rem;
    }

    .records{
      font-weight:300;
      letter-spacing:3px;
      opacity:0.85;
    }

    /* HAMBURGER */

    .hamburger{
      position:absolute;
      right:30px;
      display:flex;
      flex-direction:column;
      gap:6px;
      cursor:pointer;
    }

    .hamburger span{
      width:25px;
      height:2px;
      background:white;
      transition:0.3s;
    }

    /* MOBILE MENU */

    .mobile-menu{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100vh;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      gap:30px;
      transform:translateY(-100%);
      transition:0.4s;
      z-index:999;
    }

    .mobile-menu.active{
      transform:translateY(0);
    }

    .mobile-menu a{
      color:white;
      font-size:2rem;
      text-decoration:none;
    }

    /* HERO */

    .hero{
      position:relative;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
      padding:20px;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(-45deg,#000,#0f172a,#111827,#1e1b4b,#000);
      background-size:400% 400%;
      animation:gradientMove 15s ease infinite;
      z-index:-2;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:900px;
      height:900px;
      background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 70%);
      filter:blur(50px);
      animation:float 10s ease-in-out infinite;
      z-index:-1;
    }

    @keyframes gradientMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    @keyframes float{
      0%{transform:translateY(0);}
      50%{transform:translateY(-40px);}
      100%{transform:translateY(0);}
    }

    #title{
      font-size:clamp(3rem,10vw,7rem);
      margin-bottom:20px;
    }

    .hero-avelle{
      font-family:'Allura', cursive;
      font-size:1.2em;
    }

    .subtitle{
      opacity:0.8;
      max-width:700px;
      margin:auto;
      line-height:1.8;
    }

    .hero-button{
      display:inline-block;
      margin-top:35px;
      padding:14px 28px;
      border-radius:999px;
      background:white;
      color:black;
      text-decoration:none;
      font-weight:600;
      transition:0.3s;
    }

    .hero-button:hover{
      transform:scale(1.05);
      opacity:0.9;
    }

    /* SECTION */

    .section{
      padding:120px 10%;
    }

    .section-title{
      font-size:2.5rem;
      margin-bottom:50px;
      text-align:center;
    }

    .demo-form-wrapper{
      max-width:700px;
      margin:auto;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:40px;
      backdrop-filter:blur(16px);
    }

    .demo-form{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .demo-form label{
      font-size:0.9rem;
      opacity:0.8;
    }

    .demo-form input,
    .demo-form textarea{
      padding:14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(20,20,20,0.95);
      color:white;
      outline:none;
    }

    .demo-form button{
      margin-top:10px;
      padding:14px;
      border:none;
      border-radius:999px;
      background:white;
      color:black;
      font-weight:600;
      cursor:pointer;
    }

    footer{
      padding:50px 10%;
      border-top:1px solid rgba(255,255,255,0.08);
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      opacity:0.6;
    }

    /* POPUP */

    .popup{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      opacity:0;
      pointer-events:none;
      transition:0.3s;
    }

    .popup.active{
      opacity:1;
      pointer-events:auto;
    }

    .popup-box{
      background:#111;
      padding:40px;
      border-radius:24px;
      text-align:center;
    }
  </style>
</head>

<body>

<header id="header">
  <div class="logo">
    <span class="avelle">Avelle</span>
    <span class="records">RECORDS</span>
  </div>

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</header>

<div class="mobile-menu" id="mobileMenu">
  <a href="#demos">Submit Demo</a>
</div>

<main>

<section class="hero">
  <div>
    <h1 id="title">
      <span class="hero-avelle">Avelle</span> Records
    </h1>

    <p class="subtitle">
      Electronic & Pop record label based in Sweden.
    </p>

    <a href="#demos" class="hero-button">
      Send Us A Demo
    </a>
  </div>
</section>

<section class="section" id="demos">
  <h2 class="section-title">Submit Your Demo</h2>

  <div class="demo-form-wrapper">
    <form id="demoForm" action="https://formsubmit.co/avellerecords@gmail.com" method="POST" class="demo-form">
      <input type="hidden" name="_captcha" value="false">

      <input type="text" name="artist_name" placeholder="Artist Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="track_name" placeholder="Track Name" required>
      <input type="url" name="demo_link" placeholder="Demo Link" required>

      <textarea name="message" rows="5" placeholder="Message"></textarea>

      <button type="submit">Send Demo</button>
    </form>
  </div>
</section>

</main>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2>Thank You!</h2>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
const header = document.getElementById("header");
let lastScroll = 0;

window.addEventListener("scroll", () => {
  const currentScroll = window.pageYOffset;

  if (currentScroll > lastScroll && currentScroll > 50) {
    header.classList.add("hide");
  } else {
    header.classList.remove("hide");
  }

  lastScroll = currentScroll;
});

const hamburger = document.getElementById("hamburger");
const mobileMenu = document.getElementById("mobileMenu");

hamburger.addEventListener("click", () => {
  mobileMenu.classList.toggle("active");
});

document.querySelectorAll(".mobile-menu a").forEach(link => {
  link.addEventListener("click", () => {
    mobileMenu.classList.remove("active");
  });
});

const form = document.getElementById("demoForm");
const popup = document.getElementById("popup");

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const formData = new FormData(form);

  await fetch(form.action,{ method:"POST", body:formData });

  popup.classList.add("active");
  form.reset();
});

function closePopup(){
  popup.classList.remove("active");
}
</script>

</body>
</html>
