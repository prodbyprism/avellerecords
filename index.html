<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avelle Records</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Allura&family=Quicksand:wght@300..700&display=swap');

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      background:#000;
      color:white;
      font-family:'Quicksand', sans-serif;
      overflow-x:hidden;
    }

    header{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      padding:24px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:1000;
      background:rgba(0,0,0,0.35);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .avelle{
      font-family:'Allura', cursive;
      font-size:3rem;
    }

    .records{
      font-weight:300;
      letter-spacing:3px;
      opacity:0.85;
    }

    nav{display:flex;gap:30px;}
    nav a{text-decoration:none;color:white;opacity:0.8;}
    nav a:hover{opacity:1;}

    .hero{
      position:relative;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
      padding:20px;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(-45deg,#000,#0f172a,#111827,#1e1b4b,#000);
      background-size:400% 400%;
      animation:gradientMove 15s ease infinite;
      z-index:-2;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:900px;
      height:900px;
      background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 70%);
      filter:blur(50px);
      animation:float 10s ease-in-out infinite;
      z-index:-1;
    }

    @keyframes gradientMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
    @keyframes float{0%{transform:translateY(0);}50%{transform:translateY(-40px);}100%{transform:translateY(0);}}

    #title{font-size:clamp(3rem,10vw,7rem);margin-bottom:20px;}
    .hero-avelle{font-family:'Allura', cursive;font-size:1.2em;}
    .subtitle{opacity:0.8;max-width:700px;margin:auto;line-height:1.8;}

    .section{padding:120px 10%;}
    .section-title{font-size:2.5rem;margin-bottom:50px;}

    .artists-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:30px;
    }

    .artist-card{
      height:420px;
      border-radius:26px;
      overflow:hidden;
      cursor:pointer;
      background:#111;
      transition:0.4s;
      position:relative;
    }

    .artist-card:hover{transform:translateY(-10px);}
    .artist-card img{width:100%;height:100%;object-fit:cover;transition:0.5s;}
    .artist-card:hover img{transform:scale(1.05);}

    .artist-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(to top,rgba(0,0,0,0.95),transparent);
      display:flex;
      align-items:flex-end;
      padding:28px;
    }

    .artist-name{font-size:1.7rem;font-weight:700;}
    .artist-genre{opacity:0.7;margin-top:6px;}

    .artist-section{
      position:fixed;
      inset:0;
      background:#000;
      z-index:5000;
      padding:120px 10%;
      overflow-y:auto;

      opacity:0;
      visibility:hidden;
      transform:translateY(40px);
      transition:0.45s ease;
    }

    .artist-section.active{
      opacity:1;
      visibility:visible;
      transform:translateY(0);
    }

    .artist-banner{height:60vh;border-radius:30px;overflow:hidden;position:relative;margin-bottom:60px;}
    .artist-banner img{width:100%;height:100%;object-fit:cover;filter:brightness(0.45);}
    .artist-banner-content{position:absolute;bottom:40px;left:40px;}
    .artist-banner-name{font-size:clamp(3rem,7vw,6rem);}

    .artist-content{display:grid;grid-template-columns:2fr 1fr;gap:60px;}
    .artist-bio{line-height:1.9;opacity:0.9;}

    .sidebar{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:30px;}
    .socials a{display:block;margin-bottom:12px;color:white;opacity:0.75;text-decoration:none;}
    .socials a:hover{opacity:1;}

    .back{display:inline-block;margin-bottom:30px;padding:12px 18px;background:rgba(255,255,255,0.08);border-radius:999px;text-decoration:none;color:white;}

    footer{padding:50px 10%;border-top:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;flex-wrap:wrap;opacity:0.6;}

    @media(max-width:900px){nav{display:none;} .artist-content{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="avelle">Avelle</span>
    <span class="records">RECORDS</span>
  </div>
  <nav>
    <a href="#artists">Artists</a>
    <a href="#">Releases</a>
    <a href="#">News</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1 id="title"><span class="hero-avelle">Avelle</span> Records</h1>
    <p class="subtitle">Building the next wave of electronic artists and cinematic sound.</p>
  </div>
</section>

<section class="section" id="artists">
  <h2 class="section-title">Artists</h2>
  <div class="artists-grid" id="grid"></div>
</section>

<section class="artist-section" id="artistSection">
  <a class="back" onclick="closeArtist()">← Back</a>

  <div class="artist-banner">
    <img id="img">
    <div class="artist-banner-content">
      <div class="artist-banner-name" id="name"></div>
      <div id="genre"></div>
    </div>
  </div>

  <div class="artist-content">
    <div>
      <h2>About</h2>
      <p class="artist-bio" id="bio"></p>
    </div>

    <div class="sidebar">
      <h3>Socials</h3>
      <div class="socials" id="socials"></div>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Avelle Records</p>
  <p>Designed for music.</p>
</footer>

<script>
let artists = [];

fetch('artists.json')
  .then(r => r.json())
  .then(data => {
    artists = data;
    renderArtists();
  });

const grid = document.getElementById("grid");

function renderArtists(){
  artists.forEach(a => {
    const el = document.createElement("div");
    el.className = "artist-card";

    el.innerHTML = `
      <img src="${a.image}">
      <div class="artist-overlay">
        <div>
          <div class="artist-name">${a.name}</div>
          <div class="artist-genre">${a.genre}</div>
        </div>
      </div>
    `;

    el.onclick = () => openArtist(a);
    grid.appendChild(el);
  });
}

function openArtist(a){
  document.getElementById("artistSection").classList.add("active");

  document.getElementById("name").textContent = a.name;
  document.getElementById("genre").textContent = a.genre;
  document.getElementById("bio").textContent = a.bio;
  document.getElementById("img").src = a.image;

  const s = document.getElementById("socials");
  s.innerHTML = "";

  Object.entries(a.socials).forEach(([k,v]) => {
    const link = document.createElement("a");
    link.href = v;
    link.textContent = k;
    link.target = "_blank";
    s.appendChild(link);
  });

  document.body.style.overflow = "hidden";
}

function closeArtist(){
  document.getElementById("artistSection").classList.remove("active");
  document.body.style.overflow = "auto";
}
</script>

</body>
</html>
