<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avelle Records</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Allura&family=Quicksand:wght@300..700&display=swap');

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      background:#000;
      color:white;
      font-family:'Quicksand', sans-serif;
      overflow-x:hidden;
    }

    header{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      padding:24px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:1000;
      background:rgba(0,0,0,0.35);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .avelle{
      font-family:'Allura', cursive;
      font-size:3rem;
    }

    .records{
      font-weight:300;
      letter-spacing:3px;
      opacity:0.85;
    }

    nav{
      display:flex;
      gap:30px;
    }

    nav a{
      text-decoration:none;
      color:white;
      opacity:0.8;
      transition:0.3s;
    }

    nav a:hover{
      opacity:1;
    }

    .hero{
      position:relative;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
      padding:20px;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(-45deg,#000,#0f172a,#111827,#1e1b4b,#000);
      background-size:400% 400%;
      animation:gradientMove 15s ease infinite;
      z-index:-2;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:900px;
      height:900px;
      background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 70%);
      filter:blur(50px);
      animation:float 10s ease-in-out infinite;
      z-index:-1;
    }

    @keyframes gradientMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    @keyframes float{
      0%{transform:translateY(0);}
      50%{transform:translateY(-40px);}
      100%{transform:translateY(0);}
    }

    #title{
      font-size:clamp(3rem,10vw,7rem);
      margin-bottom:20px;
    }

    .hero-avelle{
      font-family:'Allura', cursive;
      font-size:1.2em;
    }

    .subtitle{
      opacity:0.8;
      max-width:700px;
      margin:auto;
      line-height:1.8;
    }

    .hero-button{
      display:inline-block;
      margin-top:35px;
      padding:14px 28px;
      border-radius:999px;
      background:white;
      color:black;
      text-decoration:none;
      font-weight:600;
      transition:0.3s;
    }

    .hero-button:hover{
      transform:scale(1.05);
      opacity:0.9;
    }

    .section{
      padding:120px 10%;
    }

    .section-title{
      font-size:2.5rem;
      margin-bottom:50px;
      text-align:center;
    }

    .demo-form-wrapper{
      max-width:700px;
      margin:auto;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:40px;
      backdrop-filter:blur(16px);
    }

    .demo-form{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .demo-form label{
      font-size:0.9rem;
      opacity:0.8;
    }

    .demo-form input,
    .demo-form textarea{
      padding:14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(20,20,20,0.95);
      color:white;
      outline:none;
      transition:0.2s;
      font-family:'Quicksand', sans-serif;
    }

    .demo-form input:focus,
    .demo-form textarea:focus{
      border-color:#fff;
      background:rgba(35,35,35,0.95);
      box-shadow:0 0 0 2px rgba(255,255,255,0.08);
    }

    .demo-form button{
      margin-top:10px;
      padding:14px;
      border:none;
      border-radius:999px;
      background:white;
      color:black;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      font-size:1rem;
    }

    .demo-form button:hover{
      transform:scale(1.03);
      opacity:0.9;
    }

    footer{
      padding:50px 10%;
      border-top:1px solid rgba(255,255,255,0.08);
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      opacity:0.6;
    }

    @media(max-width:900px){
      header{
        padding:20px 24px;
      }

      nav{
        display:none;
      }

      .avelle{
        font-size:2.3rem;
      }

      .section{
        padding:100px 24px;
      }
    }

    /* POPUP */

    .popup{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      opacity:0;
      pointer-events:none;
      transition:0.3s;
    }

    .popup.active{
      opacity:1;
      pointer-events:auto;
    }

    .popup-box{
      background:#111;
      border:1px solid rgba(255,255,255,0.1);
      padding:40px;
      border-radius:24px;
      text-align:center;
      max-width:400px;
      width:90%;
      animation:pop 0.3s ease;
    }

    @keyframes pop{
      from{
        transform:scale(0.9);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    .popup-box h2{
      font-size:2rem;
      margin-bottom:10px;
    }

    .popup-box p{
      opacity:0.7;
      margin-bottom:20px;
      line-height:1.6;
    }

    .popup-box button{
      padding:12px 20px;
      border-radius:999px;
      border:none;
      background:white;
      color:black;
      cursor:pointer;
      font-weight:600;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <span class="avelle">Avelle</span>
    <span class="records">RECORDS</span>
  </div>

  <nav>
    <a href="#demos">Submit Demo</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1 id="title">
      <span class="hero-avelle">Avelle</span> Records
    </h1>

    <p class="subtitle">
      Electronic record label based in Sweden.
    </p>

    <a href="#demos" class="hero-button">
      Send Us A Demo
    </a>
  </div>
</section>

<section class="section" id="demos">
  <h2 class="section-title">Submit Your Demo</h2>

  <div class="demo-form-wrapper">

    <form 
      id="demoForm"
      action="https://formsubmit.co/avellerecords@gmail.com"
      method="POST"
      class="demo-form"
    >

      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">

      <label>Artist Name</label>
      <input type="text" name="artist_name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Track Name</label>
      <input type="text" name="track_name" required>

      <label>Genre</label>
      <input type="text" name="genre">

      <label>Demo Link</label>
      <input type="url" name="demo_link" required>

      <label>Message</label>
      <textarea name="message" rows="6"></textarea>

      <button type="submit">
        Send Demo
      </button>

    </form>
  </div>
</section>

<footer>
  <p>© 2026 Avelle Records</p>
  <p>Designed for music.</p>
</footer>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2>Thank You!</h2>

    <p>
      Your demo has been received.
      We'll listen and get back if it's a fit.
    </p>

    <button onclick="closePopup()">
      Close
    </button>
  </div>
</div>

<script>
const form = document.getElementById("demoForm");
const popup = document.getElementById("popup");

form.addEventListener("submit", async function(e){

  e.preventDefault();

  const formData = new FormData(form);

  try{

    await fetch(form.action,{
      method:"POST",
      body:formData
    });

    popup.classList.add("active");
    form.reset();

  }catch(error){

    alert("Something went wrong.");

  }

});

function closePopup(){
  popup.classList.remove("active");
}
</script>

</body>
</html>
