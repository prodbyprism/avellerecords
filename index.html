<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Avelle Records</title>

  <!-- PWA / ICONS -->
  <link rel="manifest" href="manifest.json">

  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">

  <meta name="theme-color" content="#000000">

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Quicksand:wght@300..700&family=Allura&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      background:#000;
      color:white;
      font-family:'Quicksand', sans-serif;
      overflow-x:hidden;
    }

    /* HEADER (OVERLAY) */
    header{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      padding:24px 0;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:1000;
      background:transparent;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .avelle{
      font-family:'Allura', cursive;
      font-size:2.5rem;
    }

    .records{
      font-weight:300;
      letter-spacing:3px;
      opacity:0.85;
    }

    /* STRIPE */
    .stripe{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:42px;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:999;
      transform:translateY(-100%);
      transition:0.35s ease;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .stripe.active{
      transform:translateY(0);
    }

    .stripe span{
      font-family:'Anton', sans-serif;
      letter-spacing:3px;
      color:white;
      font-size:0.9rem;
    }

    /* HERO */
    .hero{
      position:relative;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
      padding:20px;
    }

    .hero-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
      filter:brightness(0.95) contrast(1.05) saturate(1.05);
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at center, rgba(0,0,0,0.12), rgba(0,0,0,0.30));
      z-index:-1;
    }

    #title{
      font-family:'Anton', sans-serif;
      font-size:clamp(2rem, 5vw, 3.5rem);
      margin-bottom:16px;
      line-height:1.2;
    }

    .hero-button{
      display:inline-block;
      margin-top:35px;
      padding:14px 28px;
      border-radius:999px;
      background:white;
      color:black;
      text-decoration:none;
      font-weight:600;
      transition:0.3s;
    }

    .hero-button:hover{
      transform:scale(1.05);
      opacity:0.9;
    }

    /* SECTION */
    .section{
      padding:120px 10%;
    }

    .section-title{
      font-size:2.5rem;
      margin-bottom:50px;
      text-align:center;
    }

    .demo-form-wrapper{
      max-width:700px;
      margin:auto;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:40px;
      backdrop-filter:blur(16px);
    }

    .demo-form{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .demo-form input,
    .demo-form textarea{
      padding:14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(20,20,20,0.95);
      color:white;
      outline:none;
    }

    .demo-form button{
      margin-top:10px;
      padding:14px;
      border:none;
      border-radius:999px;
      background:white;
      color:black;
      font-weight:600;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header id="header">
  <div class="logo">
    <span class="avelle">Avelle</span>
    <span class="records">RECORDS</span>
  </div>
</header>

<div class="stripe" id="stripe">
  <span>AVELLE RECORDS</span>
</div>

<main>

<section class="hero" id="hero">

  <video autoplay muted loop playsinline class="hero-video">
    <source src="Videos/hero.mp4" type="video/mp4">
  </video>

  <div>
    <h1 id="title">
      Swedish electronic and pop record label.
    </h1>

    <a href="#demos" class="hero-button">
      Send Us A Demo
    </a>
  </div>
</section>

<section class="section" id="demos">
  <h2 class="section-title">Submit Your Demo</h2>

  <div class="demo-form-wrapper">
    <form class="demo-form" action="https://formsubmit.co/avellerecords@gmail.com" method="POST">
      <input type="hidden" name="_captcha" value="false">

      <input type="text" name="artist_name" placeholder="Artist Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="track_name" placeholder="Track Name" required>
      <input type="url" name="demo_link" placeholder="Demo Link" required>

      <textarea name="message" rows="5" placeholder="Message"></textarea>

      <button type="submit">Send Demo</button>
    </form>
  </div>
</section>

</main>

<script>
const header = document.getElementById("header");
const stripe = document.getElementById("stripe");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      stripe.classList.remove("active");
    } else {
      stripe.classList.add("active");
    }
  });
}, {
  threshold: 0
});

observer.observe(header);
</script>

</body>
</html>
